<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Berriz Reader</title>
    <!-- Modern Google Fonts: Inter for UI and reading text -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="styles.css">
    
    <!-- Load sql.js from CDN for WebAssembly SQLite -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.12.0/sql-wasm.js"></script>
</head>
<body>
    <div id="app">
        <header class="app-header">
            <div class="logo-container">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="logo-icon"><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20"></path></svg>
                <h1>Berriz Reader</h1>
            </div>
            <div class="header-actions">
                <button id="sync-db-btn" class="icon-btn" title="Sync Database">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"></polyline><polyline points="1 20 1 14 7 14"></polyline><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path></svg>
                </button>
                <button id="toggle-translate" class="icon-btn" title="Toggle Translations">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m5 8 6 6"></path><path d="m4 14 6-6 2-3"></path><path d="M2 5h12"></path><path d="M7 2h1"></path><path d="m22 22-5-10-5 10"></path><path d="M14 18h6"></path></svg>
                </button>
                <button id="toggle-cultural" class="icon-btn" title="Toggle Cultural Notes">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path></svg>
                </button>
            </div>
        </header>
        
        <!-- Tab Bar -->
        <nav id="board-tabs" class="tabs-container hidden">
            <!-- Tabs injected via JS -->
        </nav>
        
        <main id="main-content">
            <!-- Loading State -->
            <div id="loading-state" class="loading-container hidden">
                <div class="spinner"></div>
                <p>Syncing database from cloud...</p>
            </div>
            
            <!-- Empty State -->
            <div id="empty-state" class="loading-container hidden">
                <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="var(--text-secondary)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="margin-bottom: 16px;"><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20"></path></svg>
                <h2 style="color: var(--text-primary); margin-bottom: 8px;">No Database Found</h2>
                <p>Please sync the database to start reading.</p>
                <button id="empty-sync-btn" style="background-color: var(--accent-color); color: #fff; border: none; padding: 12px 24px; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; margin-top: 24px; transition: var(--transition);">Sync Now</button>
            </div>
            
            <!-- Error State -->
            <div id="error-state" class="error-container hidden">
                <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="error-icon"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>
                <h2>Connection Error</h2>
                <p id="error-message"></p>
                <button id="retry-btn">Retry Connection</button>
            </div>
            
            <!-- Feed Data Container -->
            <div id="feed-container" class="feed-container hidden">
                <!-- Data will be dynamically injected here via JS -->
            </div>
            
            <!-- Thread Detail Container -->
            <div id="thread-detail-container" class="thread-detail-container hidden">
                <!-- Thread detail injected via JS -->
            </div>
        </main>
    </div>
    
    <!-- Main application logic -->
    <script type="module" src="app.js"></script>
</body>
</html>
